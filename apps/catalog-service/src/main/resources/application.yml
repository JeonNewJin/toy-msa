server:
  port: 0
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

grpc:
  server:
    port: 9091

spring:
  main:
    web-application-type: servlet
  application:
    name: catalog-service
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - logging.yml
      - monitoring.yml

eureka:
  client:
    enabled: false

---
spring.config.activate.on-profile: local, test

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka
    fetch-registry: true
    register-with-eureka: true

spring:
  jpa:
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

management:
  server:
    port: 8084

logging:
  level:
    io.grpc: DEBUG

---
spring.config.activate.on-profile: dev

---
spring.config.activate.on-profile: qa

---
spring.config.activate.on-profile: prd

spring:
  jpa:
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
