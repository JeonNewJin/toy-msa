name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # 매니페스트 변경 후 git push를 위해 write 필요
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/jeonnewjin/toy-msa

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      user: ${{ steps.filter.outputs.user }}
      order: ${{ steps.filter.outputs.order }}
      catalog: ${{ steps.filter.outputs.catalog }}
      any_changed: ${{ steps.check.outputs.any_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user:
              - 'apps/user-service/**'
              - 'modules/**'
              - 'supports/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
            order:
              - 'apps/order-service/**'
              - 'modules/**'
              - 'supports/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
            catalog:
              - 'apps/catalog-service/**'
              - 'modules/**'
              - 'supports/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'

      - name: Check any changes
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || \
                "${{ steps.filter.outputs.user }}" == "true" || \
                "${{ steps.filter.outputs.order }}" == "true" || \
                "${{ steps.filter.outputs.catalog }}" == "true" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: Build & Push (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            changed: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.user }}
          - service: order-service
            changed: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.order }}
          - service: catalog-service
            changed: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.catalog }}

    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping."

      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Update Manifests (GitOps)
    needs: [ detect-changes, build-push ]
    if: needs.detect-changes.outputs.any_changed == 'true' && needs.build-push.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: JeonNewJin/toy-msa-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tags in manifests
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"

          if [[ "$DISPATCH" == "true" || "${{ needs.detect-changes.outputs.user }}" == "true" ]]; then
            sed -i "s|tag:.*|tag: \"${SHA}\"|g" \
              apps/user-service/values-prd.yaml
          fi
          if [[ "$DISPATCH" == "true" || "${{ needs.detect-changes.outputs.order }}" == "true" ]]; then
            sed -i "s|tag:.*|tag: \"${SHA}\"|g" \
              apps/order-service/values-prd.yaml
          fi
          if [[ "$DISPATCH" == "true" || "${{ needs.detect-changes.outputs.catalog }}" == "true" ]]; then
            sed -i "s|tag:.*|tag: \"${SHA}\"|g" \
              apps/catalog-service/values-prd.yaml
          fi

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.event.workflow_run.head_sha || github.sha }}"
          git push
