management:
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application:
        ${spring.application.name}
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
          - busrefresh
          - circuitbreakers
          - circuitbreakerevents
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          show-components: always
          include:
            - livenessState
        readiness:
          show-components: always
    prometheus:
      access: read_only
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  server:
    port: 8081
  observations:
    annotations:
      enabled: true
    key-values:
      application:
        ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0 # 개발환경에선 100% 추적
    propagation:
      type: W3C
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    correlation: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'